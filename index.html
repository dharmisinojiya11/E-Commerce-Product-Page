<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - ShopZone</title>
<link rel="stylesheet" href="app.css">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #131921, #232f3e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
      color: #131921;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #ff9900;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #e68a00;
    }

    p {
      font-size: 12px;
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>ShopZone Login</h2>

    <input id="email" type="text" placeholder="Enter Email">
    <input id="pass" type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p>Demo e-commerce login page</p>
  </div>

  <script>
    function login() {
      let email = document.getElementById("email").value;
      let pass = document.getElementById("pass").value;

      if (email === "" || pass === "") {
        alert("Please fill all fields");
        return;
      }

      // Redirect to product page
      window.location.href = "products.html";
    }
  </script>
<script src="app.js"></script>
</body>
</html>
